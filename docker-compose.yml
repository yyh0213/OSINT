services:
  osint-dashboard:
    image: starmoby/osint-dashboard:latest
    container_name: osint-dashboard
    ports:
      - "8000:8000"           # 로컬 개발: localhost:8000 으로 접속
    volumes:
      - ./OSINT_REPORT:/app/OSINT_REPORT   # 보고서가 로컬 폴더에 영구 저장됨
    env_file:
      - .env                  # 아래 .env 파일에서 환경변수 자동 로드
    restart: unless-stopped
