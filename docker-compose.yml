services:
  osint-dashboard:
    build: .                   # 현재 폴더(Dockerfile)로 직접 빌드
    image: starmoby/osint-dashboard:latest   # 빌드 후 이 이름으로 태깅
    container_name: osint-dashboard
    ports:
      - "8000:8000"
    volumes:
      - ./OSINT_REPORT:/app/OSINT_REPORT     # 보고서 영구 보존
    env_file:
      - .env
    restart: unless-stopped
